<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChristLife World — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0520; color: #fff;
      font-family: 'Nunito', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; text-align: center;
      padding: 24px;
    }
    h1 { font-family: 'Fredoka One', cursive; color: #FFD700; font-size: 36px; margin-bottom: 12px; }
    p { color: #ccc; font-size: 16px; line-height: 1.6; max-width: 320px; margin-bottom: 24px; }
    .cross { font-size: 64px; margin-bottom: 20px; }
    button {
      padding: 14px 28px; background: #7C3AED; color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Fredoka One', cursive; font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="cross">✝️</div>
  <h1>You're Offline</h1>
  <p>ChristLife World needs a connection to sync with other players.
     Check your internet and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
